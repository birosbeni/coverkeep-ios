# XcodeGen spec — regenerate with `xcodegen generate` after adding files.
# XcodeGen is a dev-time tool only; the app itself has no third-party
# dependencies (KeepCore and WarrantyRules are first-party packages).
name: Coverkeep
options:
  bundleIdPrefix: com.birosbenedek
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  KeepCore:
    path: ../keepcore
  WarrantyRules:
    path: WarrantyRules

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Coverkeep:
    type: application
    platform: iOS
    sources:
      - Coverkeep
    dependencies:
      - package: KeepCore
        product: KeepCore
      - package: WarrantyRules
        product: WarrantyRules
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.birosbenedek.coverkeep
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: Coverkeep photographs your receipts so you keep a durable, full-quality copy before the paper fades.
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        # No networking beyond StoreKit/CloudKit — standard exemption.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"

  CoverkeepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CoverkeepTests
    dependencies:
      - target: Coverkeep
      - package: WarrantyRules
        product: WarrantyRules
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Coverkeep:
    build:
      targets:
        Coverkeep: all
    run:
      storeKitConfiguration: Coverkeep.storekit
    test:
      targets:
        - CoverkeepTests
